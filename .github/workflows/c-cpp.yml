name: Build and Release UsingBYOVD

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - "v*" 
  pull_request:
    branches: [ "main", "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # 第一步：让 MSBuild 自身去嗅探并对齐系统里的 SDK 文件夹（避开 PowerShell 命令行解析）
    - name: Retarget Solution SDK
      run: msbuild UsingBYOVD.sln /t:RetargetSelection /p:Configuration=Release /p:Platform=x64

    # 第二步：安全编译
    - name: Build Solution with MSBuild
      run: msbuild UsingBYOVD.sln /p:Configuration=Release /p:Platform=x64 /p:TreatWarningsAsErrors=false

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: UsingBYOVD-Release-x64
        path: x64/Release/*.exe

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: x64/Release/*.exe
        name: "Release ${{ github.ref_name }}"
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
