name: Build and Release UsingBYOVD

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - "v*" 
  pull_request:
    branches: [ "main", "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true" # 顺手帮你屏蔽底层的 Node 警告

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # 关键点修复：显式指定 WindowsTargetPlatformVersion=10.0.22621.0
    - name: Build Solution with MSBuild
      run: msbuild UsingBYOVD.sln /p:Configuration=Release /p:Platform=x64 /p:WindowsTargetPlatformVersion=10.0.22621.0 /p:TreatWarningsAsErrors=false

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: UsingBYOVD-Release-x64
        path: x64/Release/*.exe

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: x64/Release/*.exe
        name: "Release ${{ github.ref_name }}"
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
